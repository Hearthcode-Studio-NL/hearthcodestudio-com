# hearthcodestudio-com CI
# Reference: HearthCode-Vault/04-Standards/Testing-Policy.md
#
# Jobs:
#   fast        — lint + typecheck + unit. Blocks on every push.
#   audit       — npm audit (high). Blocks.
#   codeql      — static analysis. NON-BLOCKING (upload requires GHAS on
#                 private repos; analysis still runs and logs findings).
#   full        — Playwright (smoke + a11y) against a production build.
#                 Blocks on PR and merge-to-main.
#   lighthouse  — PR-only performance + a11y + SEO check. Blocks on PR.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast checks (lint + typecheck + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:run

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  full:
    name: Integration + smoke + a11y
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: [fast, audit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run build
      - run: npm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [fast]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx @lhci/cli autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

# ------------------------------------------------------------------
# Required status checks (set in Settings → Branches → main protection):
#   - fast
#   - audit
#   - full
#   - lighthouse   (only enforceable on PR; main pushes skip it)
#   (do NOT require codeql — intentionally non-blocking)
# ------------------------------------------------------------------
